name: Database Backup to Artifacts

on:
  schedule:
    # Run at the top of every hour
    - cron: '0 * * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Database Backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Create a timestamped backup filename
          TIMESTAMP=$(date +"%Y-%m-%d-%H%M%S")
          FILENAME="backup-$TIMESTAMP.sql"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          
          # Run pg_dump using the official PostgreSQL 17 Docker image to match Supabase's server version
          docker run --rm postgres:17-alpine pg_dump "${DATABASE_URL}?sslmode=require" --clean --if-exists --no-owner --no-privileges > "$FILENAME"

      - name: Upload Backup to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 7
